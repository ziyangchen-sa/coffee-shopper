name: Refresh B&W tasting notes (OCR)

# Keeps bw-notes.json current by OCR-ing Black & White's card images.
# Runs weekly, and can be triggered manually from the Actions tab.
on:
  schedule:
    - cron: '17 8 * * 1'        # every Monday ~08:17 UTC
  workflow_dispatch: {}          # manual "Run workflow" button

permissions:
  contents: write                # allow committing the updated bw-notes.json

concurrency:
  group: ocr-notes
  cancel-in-progress: true

jobs:
  ocr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tesseract OCR
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: pip install pillow

      - name: OCR Black & White card images -> bw-notes.json
        run: python3 tools/ocr_bw_notes.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- bw-notes.json; then
            echo "No changes to bw-notes.json."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add bw-notes.json
            git commit -m "chore: refresh B&W tasting notes (OCR)"
            git push
          fi
